<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login – CITI</title>

  <!-- Fontsource Inter -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/index.css" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a href="/" class="nav__logo" aria-label="CITI Home">
        <img src="assets/citi_logo.png" alt="CITI Logo" />
      </a>
      <ul class="menu">
        <li><a href="index.html#features" class="menu-link">Features</a></li>
        <li><a href="index.html#pricing" class="menu-link">Pricing</a></li>
        <li><a href="index.html#about" class="menu-link">About</a></li>
        <li><a href="login.html" class="btn btn-secondary">Login</a></li>
        <li><a href="signup.html" class="btn btn-primary">Open Account</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="login-section">
      <h1>Login to Your Account</h1>
      <form id="login-form" class="login-form" autocomplete="off">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="you@example.com" required autocomplete="off" />

        <label for="passport">Password Number</label>
        <input id="passport" type="text" placeholder="Enter password number" required autocomplete="off" />

        <div id="login-msg" role="alert" aria-live="polite" style="min-height:1.4em;font-size:0.95rem;margin-top:4px;"></div>

        <button type="submit" id="dashboard-btn" class="btn btn-primary" style="margin-top:12px;">
          Login
        </button>

        <p style="margin-top:16px;">Don't have an account?
          <a href="signup.html" class="link">Open Account</a>
        </p>
      </form>
    </section>
  </main>

  <script>
  (function () {
    const ALLOWED_EMAIL = 'engineerhartgijs@gmail.com';
    const ALLOWED_PASSPORT = 'HARTGIJS';

    const form = document.getElementById('login-form');
    const btn = document.getElementById('dashboard-btn');
    const msgEl = document.getElementById('login-msg');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    if (!form || !btn || !emailInput || !passwordInput || !msgEl) return;

    let attempts = 0;
    const MAX_ATTEMPTS = 6;
    let lockUntil = 0;

    function showMessage(text, color) {
      msgEl.textContent = text;
      msgEl.style.color = color || 'inherit';
    }

    function isLocked() {
      return Date.now() < lockUntil;
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      if (isLocked()) {
        showMessage('Too many attempts. Try again later.', 'crimson');
        return;
      }

      const email = (emailInput.value || '').trim();
      const password = (passwordInput.value || '').trim();

      if (!email || !password) {
        showMessage('Please enter both email and password number.', 'crimson');
        return;
      }

      const emailMatches = email.toLowerCase() === ALLOWED_EMAIL.toLowerCase();
      const passwordMatches = password === ALLOWED_PASSWORD;

      if (emailMatches && passwordMatches) {
        showMessage('Correct credentials. Redirecting…', 'green');
        setTimeout(function () {
          window.location.href = '/dashboard.html';
        }, 450);
        return;
      }

      attempts += 1;
      if (attempts >= MAX_ATTEMPTS) {
        lockUntil = Date.now() + 30000;
        showMessage('Too many failed attempts — locked for 30 seconds.', 'crimson');
        attempts = 0;
        return;
      }

      showMessage('Incorrect email or password. Login denied. (' + (MAX_ATTEMPTS - attempts) + ' attempts remaining)', 'crimson');
      passwordInput.value = '';
      password.focus();
    });
  })();
  </script>

<script>
  (function () {
    const btn = document.getElementById('dashboard-btn');
    if (!btn) return;
    btn.addEventListener('click', function (e) {
      e.preventDefault(); // prevents any enclosing form from submitting
      // Redirect to account deactivation page
      window.location.href = '/account-deactivation.html';
    });
  })();
</script>


</body>
</html>
